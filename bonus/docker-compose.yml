# version: '3.8'

services:
  web:
    image: nginx:alpine
    environment:
      - APP_PORT=${APP_PORT}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      app:
        condition: service_started

  app:
    build: ./app
    restart: always # DB가 늦게 켜져서 Node가 죽어도 알아서 다시 살아나게 함
    environment:
      - APP_PORT=${APP_PORT}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment: # Postgres가 처음 켜질 때 만들 계정과 DB 이름
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

# 도커 엔진에게 'postgres_data'라는 이름의 안전한 금고(볼륨)를 만들어 달라고 선언
volumes:
  postgres_data: